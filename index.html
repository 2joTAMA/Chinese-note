<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中国語ノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; transition: background 0.3s, color 0.3s;
  font-family: 'Noto Sans SC', 'Hiragino Sans', sans-serif; }
.material-icons { font-size: 22px; vertical-align: middle; line-height: 1; user-select: none; }

/* ヘッダー */
.header {
  position: sticky; top: 0; z-index: 10;
  padding: 0 10px; height: 52px; border-bottom-width: 1px; border-bottom-style: solid;
  display: flex; align-items: center; gap: 4px;
}
.header-title-area { flex: 1; overflow: hidden; min-width: 0; }
.header-main-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-breadcrumb { font-size: 11px; opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-btns { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
.hbtn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  padding: 6px 8px; border-radius: 8px; font-family: inherit;
  font-size: 13px; font-weight: 600; white-space: nowrap;
}
.hbtn-label { display: none; }
@media (min-width: 768px) { .hbtn-label { display: inline; } .hbtn { padding: 6px 10px; } }

/* 「保存せず終了」ボタン */
.cancel-btn {
  background: none; cursor: pointer; font-size: 12px; font-weight: 600;
  padding: 5px 9px; border-radius: 7px; border-width: 1px; border-style: solid;
  font-family: inherit; white-space: nowrap; flex-shrink: 0;
}

/* 設定パネル */
#settings-panel {
  position: fixed; top: 54px; right: 12px; z-index: 100;
  border-radius: 14px; padding: 16px; min-width: 220px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
}
.sp-label { font-size: 11px; opacity: 0.55; margin-bottom: 8px; letter-spacing: 0.05em; }
.sp-row   { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.sp-row:last-child { margin-bottom: 0; }
.sp-chip {
  border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer;
  border-width: 1.5px; border-style: solid; font-family: inherit; font-weight: 500;
}
.sp-toggle { display: flex; align-items: center; justify-content: space-between; }
.toggle-track {
  width: 44px; height: 26px; border-radius: 13px; position: relative;
  cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.toggle-thumb {
  position: absolute; top: 3px; width: 20px; height: 20px;
  border-radius: 50%; background: #fff; transition: left 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* 一覧 */
.list-section { margin-bottom: 0; }

/* フォルダ行 */
.folder-row {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; cursor: pointer;
  border-bottom-width: 1px; border-bottom-style: solid;
  position: relative; overflow: hidden; user-select: none;
}
.folder-row-inner {
  display: flex; align-items: center; gap: 10px; flex: 1;
  transition: transform 0.2s ease;
}

/* フォルダ子要素コンテナ */
.folder-children {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.folder-children.open { max-height: 3000px; }

/* フォルダ内ノート */
.child-note-row {
  display: flex; align-items: center;
  position: relative; overflow: hidden; user-select: none;
  border-bottom-width: 1px; border-bottom-style: solid;
}
.child-note-inner {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 11px 16px 11px 36px; cursor: pointer;
  transition: transform 0.2s ease;
}

/* トップレベルノート */
.top-note-row {
  display: flex; align-items: center;
  position: relative; overflow: hidden; user-select: none;
  border-bottom-width: 1px; border-bottom-style: solid;
}
.top-note-inner {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; cursor: pointer;
  transition: transform 0.2s ease;
}

.item-title   { font-size: 15px; font-weight: 500; flex: 1; }
.item-chevron { display: flex; align-items: center; opacity: 0.6; }
.item-edit-title {
  font-size: 15px; font-weight: 500; flex: 1;
  background: none; border: none; outline: none; font-family: inherit;
  border-bottom-width: 1px; border-bottom-style: solid; padding-bottom: 2px;
}

/* スワイプ */
.swipe-actions {
  display: flex; position: absolute; right: 0; top: 0; bottom: 0;
  transform: translateX(100%);
}
.swipe-btn {
  border: none; cursor: pointer; font-size: 13px; font-weight: 600;
  padding: 0 20px; color: #fff; white-space: nowrap; font-family: inherit;
}

/* ドラッグ */
.dragging { opacity: 0.35; }
.drag-over-folder { outline: 2px dashed currentColor; outline-offset: -3px; border-radius: 4px; }

/* ビューア */
.line-chinese { font-weight: 700; letter-spacing: 0.04em; cursor: pointer; position: relative; }
.line-pinyin  { letter-spacing: 0.06em; }
.line-chinese:hover { opacity: 0.85; }

/* しおり線 */
.bookmark-line {
  width: 100%; height: 2px; background: #e8820a;
  margin: 6px 0 10px; border-radius: 2px; position: relative;
}
.bookmark-line::before {
  content: '🔖';
  position: absolute; right: 0; top: -10px;
  font-size: 14px; line-height: 1;
}

/* モーダル */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); align-items: flex-end; justify-content: center; z-index: 50;
}
.modal-overlay.open { display: flex; }
.modal-box {
  width: 100%; max-width: 420px; margin: 0 auto;
  border-radius: 20px 20px 0 0; padding: 24px 20px 44px;
}
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
.modal-input {
  width: 100%; border-radius: 10px; padding: 10px 12px; font-size: 16px;
  font-family: inherit; outline: none; border-width: 1px; border-style: solid; margin-bottom: 12px;
}
.mbtn {
  width: 100%; border: none; border-radius: 10px; padding: 13px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.mbtn-ghost { background: none !important; border-width: 1px; border-style: solid; }

/* FAB */
.fab {
  position: fixed; bottom: 28px; right: 24px; width: 52px; height: 52px;
  border-radius: 50%; color: #fff; font-size: 28px; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.28); display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.93); }

/* 編集テキストエリア */
#edit-textarea {
  width: 100%; border-radius: 10px; padding: 14px; resize: none; outline: none;
  line-height: 1.9; font-family: inherit; border-width: 1px; border-style: solid; min-height: 60vh;
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// テーマ
// ============================================================
const COLORS = [
  {
    id: "night",
    label: "夜",
    bg: "#1c1c24", header: "#14141a",
    ch: "#f5f0e6", py: "#88c0a0",
    ui: "#a8a8b8", bd: "#2e2e3a", input: "#252530", accent: "#88c0a0",
    childBg: "#18181f", childBd: "#26263a",
  },
  {
    id: "paper",
    label: "紙",
    bg: "#f5f0e8", header: "#ede5d8",
    ch: "#3a2d1e", py: "#7a6a4a",
    ui: "#5a4a3a", bd: "#ddd0bc", input: "#fdfaf5", accent: "#7a6a4a",
    childBg: "#ede5d8", childBd: "#d0c4ae",
  },
];

const SIZES = [
  { label: "小", ch: 17, py: 12, lhCh: 1.65, lhPy: 1.4, mbPy: 10, mbNoPy: 16 },
  { label: "中", ch: 22, py: 14, lhCh: 1.65, lhPy: 1.4, mbPy: 14, mbNoPy: 20 },
  { label: "大", ch: 28, py: 17, lhCh: 1.65, lhPy: 1.4, mbPy: 18, mbNoPy: 26 },
];

// ============================================================
// 区切り処理
// ============================================================
const DELIMITERS_SPLIT = /([。！？!?]+)/;
const DELIMITERS_TEST  = /^[。！？!?]+$/;
// 閉じ括弧・閉じクォート
const CLOSE_CHARS = /^["""」』】〕)）]/;

function buildSegments(raw, oldSegments) {
  const oldMap = {};
  (oldSegments || []).forEach(s => { oldMap[s.chinese] = s.pinyin; });
  const segments = [];

  raw.split(/\n/).forEach(block => {
    block = block.trim();
    if (!block) return;
    const parts = block.split(DELIMITERS_SPLIT);
    let buf = "";
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      if (!part) continue;
      if (DELIMITERS_TEST.test(part)) {
        buf += part;
        // 直後が閉じ括弧・クォートなら吸収して区切らない
        const next = parts[i + 1] || "";
        if (CLOSE_CHARS.test(next)) { buf += next; i++; }
        const text = buf.trim();
        if (text) segments.push({ chinese: text, pinyin: oldMap[text] || getPy(text) });
        buf = "";
      } else {
        buf += part;
      }
    }
    const text = buf.trim();
    if (text) segments.push({ chinese: text, pinyin: oldMap[text] || getPy(text) });
  });
  return segments;
}

function getPy(text) {
  if (window.pinyinPro && window.pinyinPro.pinyin)
    return window.pinyinPro.pinyin(text, { toneType: "symbol", separator: " " });
  return "";
}

// ============================================================
// STATE
// ============================================================
const NOVEL_RAW =
`金陵，大梁帝都。物宝天华王气蒸蔚，这里连城门也与他处不同，格外的巍峨坚实。川流不息入城的人流中，一辆青蓬双辕的马车不起眼地夹在其中，摇摇缓行，在距离城门数丈之地停顿了下来。
车帘掀起，一个月白衣衫，容颜清朗的年轻人跳下车，前行几步，仰起头凝望着城门上方的"金陵"二字。
走在马车前方的两名骑士察觉到后面有异样，回过头看了一下，一齐拨转马头奔了过来。这两人都是贵族公子的打扮，年龄也大致相仿，跑在前面的一个远远就在问："苏兄，你怎么了？"
梅长苏没有回答，他依然保持着仰望城门的姿势，表情凝然不动，一头乌发被风吹起，有几丝零散地覆在苍白的面颊上，使得整个人透出一股深邃的沧桑与悲凉。
"苏兄是不是累了？"这时另外一人也奔至近前，关切地道，"就快到了，今天可以好好歇歇。"
"景睿，谢弼，"梅长苏毫无颜色的唇边掠过一抹浅淡的笑，"我想在这里再站一会儿……这么多年没来，想不到金陵城几乎丝毫未变，进了城门后，多半也依然是冠盖满京华的盛况吧……"
萧景睿微微有些怔忡，问道："怎么苏兄以前……来过金陵？"`;

let state = {
  page: "list",
  items: [
    { kind: "note",   id: 1, title: "はじめての中国語", raw: "你好，我叫小明。今天天气很好。\n我喜欢学习中文。", segments: [], folderId: null, bookmarkIdx: null, scrollY: 0 },
    { kind: "folder", id: 2, title: "小説", open: true },
    { kind: "note",   id: 3, title: "第1章", raw: NOVEL_RAW, segments: [], folderId: 2, bookmarkIdx: null, scrollY: 0 },
  ],
  currentNoteId: null,
  colorIdx: 0, sizeIdx: 1,
  showPinyin: true, showSettings: false, listEditMode: false,
  editText: "",
  nextId: 20,
  swipeOpen: null,
  dragId: null,
};

const col  = () => COLORS[state.colorIdx];
const sz   = () => SIZES[state.sizeIdx];
const note = () => state.items.find(i => i.id === state.currentNoteId);
const folderOf = (n) => n && n.folderId ? state.items.find(i => i.id === n.folderId) : null;

// ============================================================
// RENDER ROOT
// ============================================================
function render() {
  const c = col();
  document.body.style.background = c.bg;
  document.body.style.color      = c.ui;
  const app = document.getElementById("app");
  if      (state.page === "list") renderList(app);
  else if (state.page === "view") renderView(app);
  else if (state.page === "edit") renderEdit(app);
}

// ---- ヘッダー ----
function mkHeader(leftHTML, titleAreaHTML, rightHTML) {
  const c = col();
  return `<div class="header" style="background:${c.header};border-color:${c.bd};">
    <div style="flex-shrink:0;">${leftHTML}</div>
    <div class="header-title-area">${titleAreaHTML}</div>
    <div class="header-btns">${rightHTML}</div>
  </div>`;
}

function hbtn(icon, label, onclick, color) {
  return `<button class="hbtn" onclick="${onclick}" style="color:${color};">
    <span class="material-icons">${icon}</span>
    <span class="hbtn-label">${label}</span>
  </button>`;
}

// ---- 設定パネル ----
function settingsPanel() {
  if (!state.showSettings) return "";
  const c = col();
  const chip = (active, label, onclick) =>
    `<button class="sp-chip" onclick="${onclick}"
      style="background:${active ? c.accent : c.input};border-color:${active ? c.accent : c.bd};
             color:${active ? '#fff' : c.ui};">${label}</button>`;
  const trackBg  = state.showPinyin ? c.accent : c.bd;
  const thumbPos = state.showPinyin ? "21px" : "3px";
  return `<div id="settings-panel" style="background:${c.header};border:1px solid ${c.bd};">
    <div class="sp-label">文字サイズ</div>
    <div class="sp-row">
      ${SIZES.map((s,i) => chip(state.sizeIdx===i, s.label, `setSizeIdx(${i})`)).join("")}
    </div>
    <div class="sp-label">カラー</div>
    <div class="sp-row">
      ${COLORS.map((cc,i) => chip(state.colorIdx===i, cc.label, `setColorIdx(${i})`)).join("")}
    </div>
    <div class="sp-label" style="margin-top:2px;">ピンイン</div>
    <div class="sp-row sp-toggle">
      <span style="font-size:13px;color:${c.ui};">表示する</span>
      <div class="toggle-track" style="background:${trackBg};" onclick="togglePinyin()">
        <div class="toggle-thumb" style="left:${thumbPos};"></div>
      </div>
    </div>
  </div>`;
}

// ============================================================
// LIST
// ============================================================
function renderList(app) {
  const c = col(); const em = state.listEditMode;
  const topItems = state.items.filter(i => i.kind === "folder" || (i.kind === "note" && !i.folderId));
  let itemsHTML = topItems.map(item =>
    item.kind === "folder" ? folderRowHTML(item, c, em) : topNoteRowHTML(item, c, em)
  ).join("");

  const rightBtns =
    hbtn(em ? "check" : "edit", em ? "完了" : "編集", "toggleListEdit()", c.ui) +
    hbtn("settings", "設定", "toggleSettings()", c.ui);

  app.innerHTML = `
    ${mkHeader("",
      `<div class="header-main-title" style="color:${c.ch};">📖 中国語ノート</div>`,
      rightBtns
    )}
    ${settingsPanel()}
    <div id="list-scroll" style="padding-bottom:100px;" onclick="closeSwipeOnBg(event)">
      ${itemsHTML}
    </div>
    <button class="fab" onclick="openNewModal()" style="background:${c.accent};">
      <span class="material-icons" style="font-size:26px;">add</span>
    </button>

    <!-- 新規作成モーダル -->
    <div class="modal-overlay" id="newModal" onclick="closeNewModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">新規作成</div>
        <button class="mbtn" onclick="startNewNote()" style="background:${c.accent};color:#fff;">
          <span class="material-icons">description</span>新規ノート
        </button>
        <button class="mbtn" onclick="startNewFolder()" style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};">
          <span class="material-icons">folder</span>新規フォルダ
        </button>
        <button class="mbtn mbtn-ghost" onclick="closeNewModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>

    <!-- タイトル入力モーダル -->
    <div class="modal-overlay" id="titleModal" onclick="closeTitleModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" id="titleModalLabel" style="color:${c.accent};"></div>
        <input id="titleInput" class="modal-input"
          style="background:${c.input};border-color:${c.bd};color:${c.ch};"
          onkeydown="if(event.key==='Enter')confirmTitle()">
        <button class="mbtn" onclick="confirmTitle()" style="background:${c.accent};color:#fff;">作成</button>
        <button class="mbtn mbtn-ghost" onclick="closeTitleModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>

    <!-- 移動先モーダル -->
    <div class="modal-overlay" id="moveModal" onclick="closeMoveModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">移動先フォルダを選択</div>
        <button class="mbtn" onclick="moveNoteTo(null)"
          style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};">
          <span class="material-icons">inbox</span>トップレベル
        </button>
        ${state.items.filter(i => i.kind === "folder").map(f =>
          `<button class="mbtn" onclick="moveNoteTo(${f.id})"
            style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};">
            <span class="material-icons">folder</span>${esc(f.title)}
          </button>`
        ).join("")}
        <button class="mbtn mbtn-ghost" onclick="closeMoveModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>`;

  initSwipeListeners();
}

function folderRowHTML(folder, c, em) {
  const children = state.items.filter(i => i.kind === "note" && i.folderId === folder.id);
  const isOpen = folder.open;
  const childrenHTML = children.map(n => childNoteRowHTML(n, c, em)).join("");

  let rowContent = "";
  if (em) {
    rowContent = `
      <span class="material-icons" style="color:${c.accent};font-size:22px;flex-shrink:0;">folder</span>
      <input class="item-edit-title" value="${esc(folder.title)}"
        style="color:${c.ch};border-color:${c.bd};"
        onchange="renameItem(${folder.id}, this.value)">
      <button onclick="deleteItem(${folder.id})" style="background:none;border:none;color:#e05555;cursor:pointer;flex-shrink:0;">
        <span class="material-icons">remove_circle_outline</span>
      </button>`;
  } else {
    rowContent = `
      <div class="folder-row-inner" id="inner-${folder.id}">
        <span class="material-icons" style="color:${c.accent};font-size:22px;flex-shrink:0;">${isOpen ? "folder_open" : "folder"}</span>
        <span class="item-title" style="color:${c.ch};">${esc(folder.title)}</span>
        <span class="item-chevron">
          <span class="material-icons" style="font-size:26px;transition:transform 0.4s;transform:rotate(${isOpen?90:0}deg);">
            expand_more
          </span>
        </span>
      </div>
      <div class="swipe-actions" id="swipe-actions-${folder.id}">
        <button class="swipe-btn" style="background:#e05555;" onclick="deleteItem(${folder.id})">削除</button>
      </div>`;
  }

  return `
    <div class="folder-row" id="item-${folder.id}"
      style="border-color:${c.bd};background:${c.header};"
      data-id="${folder.id}" data-kind="folder"
      ${em ? "" : `onclick="toggleFolder(${folder.id})"`}
      ondragover="folderDragOver(event,${folder.id})"
      ondragleave="folderDragLeave(event,${folder.id})"
      ondrop="folderDrop(event,${folder.id})">
      ${rowContent}
    </div>
    <div class="folder-children ${isOpen?"open":""}" id="children-${folder.id}"
      style="background:${c.childBg};border-bottom:${isOpen?`1px solid ${c.bd}`:'none'};">
      ${childrenHTML}
    </div>`;
}

function childNoteRowHTML(n, c, em) {
  let inner = "";
  if (em) {
    inner = `<div style="display:flex;align-items:center;gap:10px;padding:11px 16px 11px 36px;flex:1;">
      <input class="item-edit-title" value="${esc(n.title)}"
        style="color:${c.ch};border-color:${c.childBd};"
        onchange="renameItem(${n.id}, this.value)">
      <button onclick="deleteItem(${n.id})" style="background:none;border:none;color:#e05555;cursor:pointer;flex-shrink:0;">
        <span class="material-icons">remove_circle_outline</span>
      </button>
    </div>`;
  } else {
    inner = `
      <div class="child-note-inner" id="inner-${n.id}"
        onclick="openNote(${n.id})"
        draggable="true"
        ondragstart="dragStart(event,${n.id})"
        ondragend="dragEnd(event)">
        <span class="item-title" style="color:${c.ch};font-size:14px;">${esc(n.title)}</span>
        <span class="item-chevron">
          <span class="material-icons" style="font-size:22px;">chevron_right</span>
        </span>
      </div>
      <div class="swipe-actions" id="swipe-actions-${n.id}">
        <button class="swipe-btn" style="background:#5b8fd4;" onclick="openMoveModal(${n.id})">移動</button>
        <button class="swipe-btn" style="background:#e05555;" onclick="deleteItem(${n.id})">削除</button>
      </div>`;
  }
  return `<div class="child-note-row" id="item-${n.id}" style="border-color:${c.childBd};"
    data-id="${n.id}" data-kind="note">${inner}</div>`;
}

function topNoteRowHTML(n, c, em) {
  let inner = "";
  if (em) {
    inner = `<div style="display:flex;align-items:center;gap:10px;padding:13px 16px;flex:1;">
      <input class="item-edit-title" value="${esc(n.title)}"
        style="color:${c.ch};border-color:${c.bd};"
        onchange="renameItem(${n.id}, this.value)">
      <button onclick="deleteItem(${n.id})" style="background:none;border:none;color:#e05555;cursor:pointer;flex-shrink:0;">
        <span class="material-icons">remove_circle_outline</span>
      </button>
    </div>`;
  } else {
    inner = `
      <div class="top-note-inner" id="inner-${n.id}"
        onclick="openNote(${n.id})"
        draggable="true"
        ondragstart="dragStart(event,${n.id})"
        ondragend="dragEnd(event)">
        <span class="item-title" style="color:${c.ch};">${esc(n.title)}</span>
        <span class="item-chevron">
          <span class="material-icons" style="font-size:26px;">chevron_right</span>
        </span>
      </div>
      <div class="swipe-actions" id="swipe-actions-${n.id}">
        <button class="swipe-btn" style="background:#5b8fd4;" onclick="openMoveModal(${n.id})">移動</button>
        <button class="swipe-btn" style="background:#e05555;" onclick="deleteItem(${n.id})">削除</button>
      </div>`;
  }
  return `<div class="top-note-row" id="item-${n.id}" style="border-color:${c.bd};"
    data-id="${n.id}" data-kind="note">${inner}</div>`;
}

// ============================================================
// VIEW
// ============================================================
function renderView(app) {
  const c = col(); const s = sz(); const n = note();
  if (!n) { state.page = "list"; render(); return; }
  const folder = folderOf(n);

  const linesHTML = n.segments.map((seg, idx) => {
    const isBookmark = n.bookmarkIdx === idx;
    const bmLine = isBookmark ? `<div class="bookmark-line"></div>` : "";
    if (state.showPinyin) {
      return `${bmLine}
        <div class="line-chinese" style="font-size:${s.ch}px;color:${c.ch};line-height:${s.lhCh};"
          onclick="setBookmark(${idx})">${esc(seg.chinese)}</div>
        <div class="line-pinyin" style="font-size:${s.py}px;color:${c.py};line-height:${s.lhPy};margin-bottom:${s.mbPy}px;">${seg.pinyin}</div>`;
    } else {
      return `${bmLine}
        <div class="line-chinese" style="font-size:${s.ch}px;color:${c.ch};line-height:${s.lhCh};margin-bottom:${s.mbNoPy}px;"
          onclick="setBookmark(${idx})">${esc(seg.chinese)}</div>`;
    }
  }).join("");

  const titleArea = folder
    ? `<div class="header-breadcrumb" style="color:${c.py};">${esc(folder.title)}</div>
       <div class="header-main-title" style="color:${c.ch};">${esc(n.title)}</div>`
    : `<div class="header-main-title" style="color:${c.ch};">${esc(n.title)}</div>`;

  const rightBtns =
    hbtn("bookmark", "しおり", "toggleBookmarkMode()", c.ui) +
    hbtn("edit", "編集", "goEdit()", c.ui) +
    hbtn("settings", "設定", "toggleSettings()", c.ui);

  app.innerHTML = `
    ${mkHeader(
      `<button class="hbtn" onclick="goList()" style="color:${c.py};">
        <span class="material-icons">arrow_back_ios</span>
        <span class="hbtn-label">一覧</span>
      </button>`,
      titleArea,
      rightBtns
    )}
    ${settingsPanel()}
    <div id="view-scroll" style="padding:20px 20px 120px;">
      ${linesHTML}
      ${n.segments.length === 0 ? `<div style="opacity:0.4;font-size:14px;text-align:center;padding:40px 0;">編集ボタンで文章を入力</div>` : ""}
    </div>`;

  // スクロール位置を復元
  requestAnimationFrame(() => {
    if (n.scrollY) window.scrollTo(0, n.scrollY);
  });
}

// しおりモード：行をタップしてしおりを設定（現在は直接タップで設定）
let _bookmarkMode = false;
function toggleBookmarkMode() {
  _bookmarkMode = !_bookmarkMode;
  const c = col();
  const btn = document.querySelector('.hbtn [data-bm]');
  // トースト表示
  showToast(_bookmarkMode ? "しおりを設定する行をタップしてください" : "しおりモード終了");
}

function setBookmark(idx) {
  const n = note(); if (!n) return;
  n.bookmarkIdx = (n.bookmarkIdx === idx) ? null : idx; // 同じ行タップで解除
  render();
  // スクロール位置を復元
  if (n.scrollY) requestAnimationFrame(() => window.scrollTo(0, n.scrollY));
  showToast(n.bookmarkIdx !== null ? "しおりを設定しました" : "しおりを解除しました");
}

function showToast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t = document.createElement("div"); t.id = "toast"; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.75);color:#fff;padding:8px 18px;border-radius:20px;
    font-size:13px;z-index:200;white-space:nowrap;pointer-events:none;transition:opacity 0.3s;`;
  t.style.opacity = "1";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = "0"; }, 2000);
}

// ============================================================
// EDIT
// ============================================================
function renderEdit(app) {
  const c = col(); const s = sz(); const n = note();
  if (!n) { state.page = "list"; render(); return; }

  app.innerHTML = `
    ${mkHeader(
      `<button class="cancel-btn" onclick="cancelEdit()"
        style="color:${c.ui};border-color:${c.bd};background:${c.input};">保存せず終了</button>`,
      `<div class="header-main-title" style="color:${c.ch};padding:0 4px;">${esc(n.title)}</div>`,
      `<button onclick="saveEdit()" style="background:${c.accent};border:none;border-radius:8px;
        padding:7px 16px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;">保存</button>`
    )}
    <div style="padding:10px 16px 4px;font-size:12px;opacity:0.4;">
      句点（。！？）または改行でピンインが区切られます
    </div>
    <div style="padding:8px 16px 120px;">
      <textarea id="edit-textarea"
        style="background:${c.input};border-color:${c.bd};color:${c.ch};font-size:${s.ch}px;"
        placeholder="中国語を入力...">${esc(state.editText)}</textarea>
    </div>`;

  const ta = document.getElementById("edit-textarea");
  if (ta) {
    ta.style.height = "auto";
    ta.style.height = Math.max(ta.scrollHeight, window.innerHeight * 0.65) + "px";
    ta.addEventListener("input", () => { ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px"; });
  }
}

// ============================================================
// ACTIONS — 設定
// ============================================================
function toggleSettings() { state.showSettings = !state.showSettings; render(); }
function setSizeIdx(i)    { state.sizeIdx  = i; render(); }
function setColorIdx(i)   { state.colorIdx = i; render(); }
function togglePinyin()   { state.showPinyin = !state.showPinyin; render(); }
function toggleListEdit() { state.listEditMode = !state.listEditMode; render(); }

function toggleFolder(id) {
  const f = state.items.find(i => i.id === id); if (!f) return;
  f.open = !f.open;
  // DOM直接更新（アニメーション即開始）
  const el = document.getElementById("children-" + id);
  const c = col();
  if (el) {
    el.classList.toggle("open", f.open);
    el.style.borderBottom = f.open ? `1px solid ${c.bd}` : "none";
  }
  const inner = document.getElementById("inner-" + id);
  if (inner) {
    const iconEl = inner.querySelector(".material-icons:first-child");
    if (iconEl) iconEl.textContent = f.open ? "folder_open" : "folder";
    const chevron = inner.querySelector(".item-chevron .material-icons");
    if (chevron) chevron.style.transform = `rotate(${f.open ? 180 : 0}deg)`;
  }
}

function openNote(id) {
  // 現在のノートのスクロール位置を保存
  const cur = note();
  if (cur) cur.scrollY = window.scrollY;
  state.currentNoteId = id;
  state.page = "view";
  state.showSettings = false;
  window.scrollTo(0, 0);
  render();
}

function goList() {
  // スクロール位置保存
  const n = note(); if (n) n.scrollY = window.scrollY;
  state.page = "list";
  state.showSettings = false;
  window.scrollTo(0, 0);
  render();
}

function goEdit() {
  const n = note(); if (!n) return;
  state.editText = n.raw || "";
  state.page = "edit";
  window.scrollTo(0, 0);
  render();
}

function cancelEdit() {
  state.page = "view"; render();
  const n = note(); if (n && n.scrollY) requestAnimationFrame(() => window.scrollTo(0, n.scrollY));
}

function saveEdit() {
  const ta = document.getElementById("edit-textarea"); if (!ta) return;
  const n = note(); if (!n) return;
  n.raw = ta.value;
  n.segments = buildSegments(ta.value, n.segments);
  n.bookmarkIdx = null; // 内容変更でしおりリセット
  state.page = "view";
  window.scrollTo(0, 0);
  render();
}

function renameItem(id, val) {
  const item = state.items.find(i => i.id === id); if (item) item.title = val;
}
function deleteItem(id) {
  const item = state.items.find(i => i.id === id); if (!item) return;
  const msg = item.kind === "folder"
    ? `「${item.title}」フォルダとその中のノートを削除しますか？`
    : `「${item.title}」を削除しますか？`;
  if (!confirm(msg)) return;
  state.items = item.kind === "folder"
    ? state.items.filter(i => !(i.id === id || i.folderId === id))
    : state.items.filter(i => i.id !== id);
  render();
}

// ============================================================
// MODALS
// ============================================================
let _pendingKind = null;
let _movingNoteId = null;

function openNewModal()  { render(); setTimeout(() => document.getElementById("newModal")?.classList.add("open"), 0); }
function closeNewModal() { document.getElementById("newModal")?.classList.remove("open"); }
function startNewNote()   { _pendingKind = "note";   closeNewModal(); openTitleModal("新規ノートのタイトル"); }
function startNewFolder() { _pendingKind = "folder"; closeNewModal(); openTitleModal("新規フォルダのタイトル"); }

function openTitleModal(label) {
  render();
  setTimeout(() => {
    const m = document.getElementById("titleModal"); if (!m) return;
    const l = document.getElementById("titleModalLabel"); if (l) l.textContent = label;
    const inp = document.getElementById("titleInput"); if (inp) { inp.value = ""; inp.focus(); }
    m.classList.add("open");
  }, 0);
}
function closeTitleModal() { document.getElementById("titleModal")?.classList.remove("open"); }
function confirmTitle() {
  const inp = document.getElementById("titleInput");
  const title = inp?.value.trim() || (_pendingKind === "folder" ? "新しいフォルダ" : "新しいノート");
  const id = state.nextId++;
  if (_pendingKind === "folder") {
    state.items.push({ kind: "folder", id, title, open: true });
    closeTitleModal(); render();
  } else {
    state.items.push({ kind: "note", id, title, raw: "", segments: [], folderId: null, bookmarkIdx: null, scrollY: 0 });
    closeTitleModal();
    state.currentNoteId = id; state.editText = ""; state.page = "edit"; render();
  }
}

function openMoveModal(noteId) { _movingNoteId = noteId; closeSwipe(); render(); setTimeout(() => document.getElementById("moveModal")?.classList.add("open"), 0); }
function closeMoveModal() { document.getElementById("moveModal")?.classList.remove("open"); }
function moveNoteTo(folderId) {
  const n = state.items.find(i => i.id === _movingNoteId);
  if (n) n.folderId = folderId;
  closeMoveModal(); render();
}

// ============================================================
// SWIPE
// ============================================================
function initSwipeListeners() {
  const targets = [...document.querySelectorAll(".child-note-inner"), ...document.querySelectorAll(".top-note-inner"), ...document.querySelectorAll(".folder-row-inner")];
  targets.forEach(el => {
    let startX = 0, startY = 0, tracking = false;
    el.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY; tracking = false;
    }, { passive: true });
    el.addEventListener("touchmove", e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!tracking && Math.abs(dy) > Math.abs(dx)) return;
      tracking = true;
      const id = parseInt(el.id.replace("inner-", ""));
      const actions = document.getElementById("swipe-actions-" + id); if (!actions) return;
      const w = actions.scrollWidth;
      const moved = Math.max(0, Math.min(-dx, w));
      el.style.transform = `translateX(-${moved}px)`;
      actions.style.transform = `translateX(${w - moved}px)`;
    }, { passive: true });
    el.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - startX;
      const id = parseInt(el.id.replace("inner-", ""));
      const actions = document.getElementById("swipe-actions-" + id); if (!actions) return;
      const w = actions.scrollWidth;
      if (dx < -w / 2) {
        el.style.transform = `translateX(-${w}px)`;
        actions.style.transform = `translateX(0)`;
        state.swipeOpen = id;
      } else {
        el.style.transform = ""; actions.style.transform = `translateX(${w}px)`; state.swipeOpen = null;
      }
    });
  });
}

function closeSwipe() {
  if (state.swipeOpen == null) return;
  const id = state.swipeOpen;
  const inner = document.getElementById("inner-" + id);
  const actions = document.getElementById("swipe-actions-" + id);
  if (inner) inner.style.transform = "";
  if (actions) { const w = actions.scrollWidth; actions.style.transform = `translateX(${w}px)`; }
  state.swipeOpen = null;
}
function closeSwipeOnBg(e) {
  if (state.swipeOpen != null && !e.target.closest(".swipe-actions")) closeSwipe();
}

// ============================================================
// DRAG & DROP
// ============================================================
function dragStart(e, id) {
  state.dragId = id;
  e.dataTransfer.setData("text/plain", String(id));
  e.dataTransfer.effectAllowed = "move";
  setTimeout(() => e.target.closest(".top-note-row,.child-note-row")?.classList.add("dragging"), 0);
}
function dragEnd(e) {
  e.target.closest(".top-note-row,.child-note-row")?.classList.remove("dragging");
  state.dragId = null;
}
function folderDragOver(e, folderId) {
  if (state.dragId == null) return;
  e.preventDefault(); e.dataTransfer.dropEffect = "move";
  document.getElementById("item-" + folderId)?.classList.add("drag-over-folder");
}
function folderDragLeave(e, folderId) {
  document.getElementById("item-" + folderId)?.classList.remove("drag-over-folder");
}
function folderDrop(e, folderId) {
  e.preventDefault();
  document.getElementById("item-" + folderId)?.classList.remove("drag-over-folder");
  const noteId = parseInt(e.dataTransfer.getData("text/plain"));
  const n = state.items.find(i => i.id === noteId && i.kind === "note");
  if (n) n.folderId = folderId;
  state.dragId = null; render();
}

// ============================================================
// UTIL
// ============================================================
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============================================================
// BOOT
// ============================================================
function boot() {
  state.items.forEach(item => {
    if (item.kind === "note" && (!item.segments || item.segments.length === 0))
      item.segments = buildSegments(item.raw || "", []);
    if (item.kind === "note" && item.scrollY === undefined) item.scrollY = 0;
    if (item.kind === "note" && item.bookmarkIdx === undefined) item.bookmarkIdx = null;
  });
  render();
}
function waitAndBoot() {
  if (window.pinyinPro && window.pinyinPro.pinyin) boot();
  else setTimeout(waitAndBoot, 100);
}
waitAndBoot();
</script>
