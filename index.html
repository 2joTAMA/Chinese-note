<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中国語ノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; transition: background 0.3s, color 0.3s;
  font-family: 'Noto Sans SC','Hiragino Sans',sans-serif; }
.material-icons { font-size: 22px; vertical-align: middle; line-height: 1; user-select: none; }

/* ヘッダー */
.header {
  position: sticky; top: 0; z-index: 10;
  padding: 0 10px; height: 52px; border-bottom-width: 1px; border-bottom-style: solid;
  display: flex; align-items: center; gap: 4px;
}
.header-title-area { flex: 1; overflow: hidden; min-width: 0; }
.header-main-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-breadcrumb { font-size: 11px; opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-btns { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
.hbtn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  padding: 6px 8px; border-radius: 8px; font-family: inherit;
  font-size: 13px; font-weight: 600; white-space: nowrap;
}
.hbtn-label { display: none; }
@media (min-width: 768px) { .hbtn-label { display: inline; } .hbtn { padding: 6px 10px; } }

.cancel-btn {
  background: none; cursor: pointer; font-size: 12px; font-weight: 600;
  padding: 5px 9px; border-radius: 7px; border-width: 1px; border-style: solid;
  font-family: inherit; white-space: nowrap; flex-shrink: 0;
}

/* 未保存バッジ */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.unsaved-dot { display:inline-block; width:7px; height:7px; border-radius:50%;
  background:#e8820a; margin-left:3px; animation:pulse 1.5s infinite; vertical-align:middle; }

/* 設定パネル */
#settings-panel {
  position: fixed; top: 54px; right: 12px; z-index: 100;
  border-radius: 14px; padding: 16px; min-width: 220px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
}
.sp-label { font-size: 11px; opacity: 0.55; margin-bottom: 8px; letter-spacing: 0.05em; }
.sp-row   { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.sp-row:last-child { margin-bottom: 0; }
.sp-chip {
  border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer;
  border-width: 1.5px; border-style: solid; font-family: inherit; font-weight: 500;
}
.sp-toggle { display: flex; align-items: center; justify-content: space-between; }
.toggle-track {
  width: 44px; height: 26px; border-radius: 13px; position: relative;
  cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.toggle-thumb {
  position: absolute; top: 3px; width: 20px; height: 20px;
  border-radius: 50%; background: #fff; transition: left 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* 一覧 */
.folder-row {
  display: flex; align-items: center;
  padding: 13px 16px; cursor: pointer;
  border-bottom-width: 1px; border-bottom-style: solid;
  position: relative; overflow: hidden; user-select: none; gap: 10px;
}
.folder-row-inner { display: flex; align-items: center; gap: 10px; flex: 1; transition: transform 0.2s; }
.folder-title { font-size: 15px; font-weight: 700; flex: 1; }
.folder-children {
  overflow: hidden; max-height: 0;
  transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
}
.folder-children.open { max-height: 3000px; }
.child-note-row {
  display: flex; align-items: center;
  position: relative; overflow: hidden; user-select: none;
  border-bottom-width: 1px; border-bottom-style: solid;
  margin-left: 20px;
  border-left-width: 2px; border-left-style: solid;
}
.child-note-inner {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 10px 16px 10px 20px; cursor: pointer; transition: transform 0.2s;
}
.child-title { font-size: 14px; font-weight: 500; flex: 1; }
.top-note-row {
  display: flex; align-items: center;
  position: relative; overflow: hidden; user-select: none;
  border-bottom-width: 1px; border-bottom-style: solid;
}
.top-note-inner {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; cursor: pointer; transition: transform 0.2s;
}
.top-title { font-size: 15px; font-weight: 500; flex: 1; }
.item-edit-title {
  font-size: 14px; font-weight: 500; flex: 1;
  background: none; border: none; outline: none; font-family: inherit;
  border-bottom-width: 1px; border-bottom-style: solid; padding-bottom: 2px;
}
.swipe-actions {
  display: flex; position: absolute; right: 0; top: 0; bottom: 0; transform: translateX(100%);
}
.swipe-btn {
  border: none; cursor: pointer; font-size: 13px; font-weight: 600;
  padding: 0 20px; color: #fff; white-space: nowrap; font-family: inherit;
}
.dragging { opacity: 0.35; }
.drag-over-folder { outline: 2px dashed currentColor; outline-offset: -3px; border-radius: 4px; }

/* ビューア */
.view-wrap { position: relative; }

/* しおりジャンプボタン（右側縦書き） */
#bm-jump {
  position: fixed; right: 0; top: 50%; transform: translateY(-50%);
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  padding: 12px 4px; border-radius: 8px 0 0 8px;
  cursor: pointer; z-index: 20; border: none; font-family: inherit;
  line-height: 1.3;
}

/* しおりマーク */
.bookmark-line {
  display: flex; align-items: center; gap: 8px;
  margin: 6px 0 10px; position: relative;
}
.bookmark-line-bar {
  flex: 1; height: 2px; background: #e8820a; border-radius: 2px;
}
.bookmark-icon {
  width: 20px; height: 20px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
/* フラットなしおりSVGアイコン */
.bookmark-svg { width: 16px; height: 20px; fill: #e8820a; }

/* しおり編集 */
#view-content { transition: opacity 0.25s; }
#view-content.bm-mode { opacity: 0.3; }
.bm-gap {
  display: none; width: 100%; cursor: pointer;
  padding: 8px 0; position: relative; pointer-events: auto;
}
.bm-gap.visible { display: block; }
.bm-gap-line {
  width: 100%; height: 0;
  border-top: 2px dashed rgba(232,130,10,0.7);
}
.bm-gap:hover .bm-gap-line,
.bm-gap.selected .bm-gap-line { border-color: #e8820a; border-style: solid; border-width: 2.5px; }
#bm-banner {
  display: none; position: sticky; top: 52px; z-index: 9;
  padding: 8px 16px; font-size: 13px; font-weight: 600; text-align: center;
  background: rgba(232,130,10,0.18); color: #e8820a;
  border-bottom: 1px solid rgba(232,130,10,0.3);
}
#bm-banner.visible { display: block; }

.line-chinese { font-weight: 700; letter-spacing: 0.04em; }
.line-pinyin  { letter-spacing: 0.06em; }

/* モーダル */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); align-items: flex-end; justify-content: center; z-index: 50;
}
.modal-overlay.open { display: flex; }
.modal-box {
  width: 100%; max-width: 420px; margin: 0 auto;
  border-radius: 20px 20px 0 0; padding: 24px 20px 44px;
}
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
.modal-input {
  width: 100%; border-radius: 10px; padding: 10px 12px; font-size: 16px;
  font-family: inherit; outline: none; border-width: 1px; border-style: solid; margin-bottom: 10px;
}
.mbtn {
  width: 100%; border: none; border-radius: 10px; padding: 13px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.mbtn-ghost { background: none !important; border-width: 1px; border-style: solid; }
.modal-select {
  width: 100%; border-radius: 10px; padding: 10px 12px; font-size: 15px;
  font-family: inherit; outline: none; border-width: 1px; border-style: solid;
  margin-bottom: 10px; appearance: none; cursor: pointer;
}

.fab {
  position: fixed; bottom: 28px; right: 24px; width: 52px; height: 52px;
  border-radius: 50%; color: #fff; font-size: 28px; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.28); display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.93); }

/* 編集テキストエリア */
#edit-textarea {
  width: 100%; border-radius: 10px; padding: 14px; resize: none; outline: none;
  line-height: 1.9; font-family: inherit; border-width: 1px; border-style: solid; min-height: 60vh;
}
/* タイトル編集 */
#edit-title-input {
  width: 100%; background: none; border: none; outline: none;
  font-family: inherit; font-size: 18px; font-weight: 700;
  border-bottom-width: 1px; border-bottom-style: solid; padding-bottom: 6px; margin-bottom: 10px;
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// テーマ
// ============================================================
const COLORS = [
  { id:"night", label:"夜",
    bg:"#1c1c24", header:"#14141a", ch:"#f5f0e6", py:"#88c0a0",
    ui:"#a8a8b8", bd:"#2e2e3a", input:"#252530", accent:"#88c0a0",
    childBg:"#18181f", childBd:"#3a3a50" },
  { id:"paper", label:"昼",
    bg:"#f5f0e8", header:"#ede5d8", ch:"#3a2d1e", py:"#7a6a4a",
    ui:"#5a4a3a", bd:"#ddd0bc", input:"#fdfaf5", accent:"#7a6a4a",
    childBg:"#e8dfd0", childBd:"#c8b89a" },
];
const SIZES = [
  { label:"小", ch:17, py:12, lhCh:1.65, lhPy:1.4, mbPy:10, mbNoPy:16 },
  { label:"中", ch:22, py:14, lhCh:1.65, lhPy:1.4, mbPy:14, mbNoPy:20 },
  { label:"大", ch:28, py:17, lhCh:1.65, lhPy:1.4, mbPy:18, mbNoPy:26 },
];
function defaultSizeIdx() { return window.innerWidth < 768 ? 0 : 1; }

// ============================================================
// 区切り処理
// ============================================================
const DELIMITERS_SPLIT = /([。！？!?]+)/;
const DELIMITERS_TEST  = /^[。！？!?]+$/;
// 全角・半角の閉じクォート・括弧すべて
const CLOSE_CHARS = /^["""」』】〕)）\u201d\u2019]/;

function buildSegments(raw, oldSegments) {
  const oldMap = {};
  (oldSegments||[]).forEach(s => { oldMap[s.chinese] = s.pinyin; });
  const segments = [];
  raw.split(/\n/).forEach(block => {
    block = block.trim(); if (!block) return;
    const parts = block.split(DELIMITERS_SPLIT);
    let buf = "";
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i]; if (!part) continue;
      if (DELIMITERS_TEST.test(part)) {
        buf += part;
        // 閉じクォート・括弧を連続して吸収
        while (i+1 < parts.length && CLOSE_CHARS.test(parts[i+1])) { i++; buf += parts[i]; }
        const text = buf.trim();
        if (text) segments.push({ chinese:text, pinyin:oldMap[text]||getPy(text) });
        buf = "";
      } else { buf += part; }
    }
    const text = buf.trim();
    if (text) segments.push({ chinese:text, pinyin:oldMap[text]||getPy(text) });
  });
  return segments;
}
function getPy(text) {
  if (window.pinyinPro && window.pinyinPro.pinyin)
    return window.pinyinPro.pinyin(text, { toneType:"symbol", separator:" " });
  return "";
}

// ============================================================
// STATE
// ============================================================
const NOVEL_RAW =
`金陵，大梁帝都。物宝天华王气蒸蔚，这里连城门也与他处不同，格外的巍峨坚实。川流不息入城的人流中，一辆青蓬双辕的马车不起眼地夹在其中，摇摇缓行，在距离城门数丈之地停顿了下来。
车帘掀起，一个月白衣衫，容颜清朗的年轻人跳下车，前行几步，仰起头凝望着城门上方的"金陵"二字。
走在马车前方的两名骑士察觉到后面有异样，回过头看了一下，一齐拨转马头奔了过来。这两人都是贵族公子的打扮，年龄也大致相仿，跑在前面的一个远远就在问："苏兄，你怎么了？"
梅长苏没有回答，他依然保持着仰望城门的姿势，表情凝然不动，一头乌发被风吹起，有几丝零散地覆在苍白的面颊上，使得整个人透出一股深邃的沧桑与悲凉。
"苏兄是不是累了？"这时另外一人也奔至近前，关切地道，"就快到了，今天可以好好歇歇。"
"景睿，谢弼，"梅长苏毫无颜色的唇边掠过一抹浅淡的笑，"我想在这里再站一会儿……这么多年没来，想不到金陵城几乎丝毫未变，进了城门后，多半也依然是冠盖满京华的盛况吧……"
萧景睿微微有些怔忡，问道："怎么苏兄以前……来过金陵？"`;

let state = {
  page: "list",
  items: [
    { kind:"note",   id:1, title:"はじめての中国語", raw:"你好，我叫小明。今天天气很好。\n我喜欢学习中文。", segments:[], folderId:null, bookmarkIdx:null },
    { kind:"folder", id:2, title:"小説", open:true },
    { kind:"note",   id:3, title:"第1章", raw:NOVEL_RAW, segments:[], folderId:2, bookmarkIdx:null },
  ],
  currentNoteId: null,
  colorIdx: 0, sizeIdx: 1,
  showPinyin: true, showSettings: false, listEditMode: false,
  bookmarkMode: false, bookmarkPreview: null,
  editText: "", editTitleText: "",
  nextId: 20,
  swipeOpen: null, dragId: null,
  unsaved: false,   // 未保存フラグ
};

const col      = () => COLORS[state.colorIdx];
const sz       = () => SIZES[state.sizeIdx];
const note     = () => state.items.find(i => i.id === state.currentNoteId);
const folderOf = (n) => n && n.folderId ? state.items.find(i => i.id === n.folderId) : null;

function markUnsaved() { state.unsaved = true; }

// ============================================================
// RENDER ROOT
// ============================================================
function render() {
  const c = col();
  document.body.style.background = c.bg;
  document.body.style.color      = c.ui;
  const app = document.getElementById("app");
  if      (state.page==="list") renderList(app);
  else if (state.page==="view") renderView(app);
  else if (state.page==="edit") renderEdit(app);
}

function mkHeader(leftHTML, titleAreaHTML, rightHTML) {
  const c = col();
  return `<div class="header" style="background:${c.header};border-color:${c.bd};">
    <div style="flex-shrink:0;">${leftHTML}</div>
    <div class="header-title-area">${titleAreaHTML}</div>
    <div class="header-btns">${rightHTML}</div>
  </div>`;
}
function hbtn(icon, label, onclick, color) {
  return `<button class="hbtn" onclick="${onclick}" style="color:${color};">
    <span class="material-icons">${icon}</span>
    <span class="hbtn-label">${label}</span>
  </button>`;
}

function settingsPanel() {
  if (!state.showSettings) return "";
  const c = col();
  const chip = (active, label, onclick) =>
    `<button class="sp-chip" onclick="${onclick}"
      style="background:${active?c.accent:c.input};border-color:${active?c.accent:c.bd};
             color:${active?'#fff':c.ui};">${label}</button>`;
  const trackBg  = state.showPinyin ? c.accent : c.bd;
  const thumbPos = state.showPinyin ? "21px" : "3px";
  return `<div id="settings-panel" style="background:${c.header};border:1px solid ${c.bd};">
    <div class="sp-label">文字サイズ</div>
    <div class="sp-row">${SIZES.map((s,i)=>chip(state.sizeIdx===i,s.label,`setSizeIdx(${i})`)).join("")}</div>
    <div class="sp-label">カラー</div>
    <div class="sp-row">${COLORS.map((cc,i)=>chip(state.colorIdx===i,cc.label,`setColorIdx(${i})`)).join("")}</div>
    <div class="sp-label" style="margin-top:2px;">ピンイン</div>
    <div class="sp-row sp-toggle">
      <span style="font-size:13px;color:${c.ui};">表示する</span>
      <div class="toggle-track" style="background:${trackBg};" onclick="togglePinyin()">
        <div class="toggle-thumb" style="left:${thumbPos};"></div>
      </div>
    </div>
  </div>`;
}

// ============================================================
// LIST
// ============================================================
function renderList(app) {
  const c = col(); const em = state.listEditMode;
  const topItems = state.items.filter(i => i.kind==="folder"||(i.kind==="note"&&!i.folderId));
  const itemsHTML = topItems.map(item =>
    item.kind==="folder" ? folderRowHTML(item,c,em) : topNoteRowHTML(item,c,em)
  ).join("");

  // 編集中はDriveボタンを非表示
  const driveHTML = em ? "" : driveButtonsHTML(c);
  const rightBtns = driveHTML +
    hbtn(em?"check":"edit", em?"完了":"編集", "toggleListEdit()", c.ui) +
    hbtn("settings","設定","toggleSettings()",c.ui);

  app.innerHTML = `
    ${mkHeader("",
      `<div class="header-main-title" style="color:${c.ch};">中国語ノート</div>`,
      rightBtns
    )}
    ${settingsPanel()}
    <div id="list-scroll" style="padding-bottom:100px;" onclick="closeSwipeOnBg(event)">
      ${itemsHTML}
    </div>
    <button class="fab" onclick="openNewNoteModal()" style="background:${c.accent};">
      <span class="material-icons" style="font-size:26px;">add</span>
    </button>

    <!-- 新規ノートモーダル（タイトル＋本文＋フォルダ選択を一画面で） -->
    <div class="modal-overlay" id="newNoteModal" onclick="closeNewNoteModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">新規ノート</div>
        <input id="newNoteTitle" class="modal-input" placeholder="タイトル（必須）"
          style="background:${c.input};border-color:${c.bd};color:${c.ch};">
        <textarea id="newNoteBody" rows="4" class="modal-input"
          placeholder="本文（あとで編集できます）"
          style="background:${c.input};border-color:${c.bd};color:${c.ch};resize:none;"></textarea>
        <select id="newNoteFolder" class="modal-select"
          style="background:${c.input};border-color:${c.bd};color:${c.ch};">
          <option value="">フォルダなし（トップレベル）</option>
          ${state.items.filter(i=>i.kind==="folder").map(f=>
            `<option value="${f.id}">${esc(f.title)}</option>`
          ).join("")}
        </select>
        <button class="mbtn" onclick="confirmNewNote()" style="background:${c.accent};color:#fff;">作成</button>
        <button class="mbtn mbtn-ghost" onclick="closeNewNoteModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>

    <!-- 新規フォルダモーダル -->
    <div class="modal-overlay" id="newFolderModal" onclick="closeNewFolderModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">新規フォルダ</div>
        <input id="newFolderTitle" class="modal-input" placeholder="フォルダ名"
          style="background:${c.input};border-color:${c.bd};color:${c.ch};"
          onkeydown="if(event.key==='Enter')confirmNewFolder()">
        <button class="mbtn" onclick="confirmNewFolder()" style="background:${c.accent};color:#fff;">作成</button>
        <button class="mbtn mbtn-ghost" onclick="closeNewFolderModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>

    <!-- ＋メニューモーダル -->
    <div class="modal-overlay" id="newModal" onclick="closeNewModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">新規作成</div>
        <button class="mbtn" onclick="openNewNoteOnlyModal()" style="background:${c.accent};color:#fff;">
          <span class="material-icons">description</span>新規ノート</button>
        <button class="mbtn" onclick="openNewFolderModal()" style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};">
          <span class="material-icons">folder</span>新規フォルダ</button>
        <button class="mbtn mbtn-ghost" onclick="closeNewModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>

    <!-- 移動先モーダル -->
    <div class="modal-overlay" id="moveModal" onclick="closeMoveModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">移動先フォルダを選択</div>
        <button class="mbtn" onclick="moveNoteTo(null)" style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};">
          <span class="material-icons">inbox</span>トップレベル</button>
        ${state.items.filter(i=>i.kind==="folder").map(f=>
          `<button class="mbtn" onclick="moveNoteTo(${f.id})" style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};">
            <span class="material-icons">folder</span>${esc(f.title)}</button>`
        ).join("")}
        <button class="mbtn mbtn-ghost" onclick="closeMoveModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>

function bookmarkSVG() {
  return `<svg class="bookmark-svg" viewBox="0 0 16 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 0h12a2 2 0 0 1 2 2v18l-6-4-6 4V2A2 2 0 0 1 2 0z"/>
  </svg>`;
}

function renderView(app) {
  const c = col(); const s = sz(); const n = note();
  if (!n) { state.page="list"; render(); return; }
  const folder = folderOf(n);
  const bm = state.bookmarkMode;
  const total = n.segments.length;

  let linesHTML = "";
  for (let idx = 0; idx < total; idx++) {
    const seg = n.segments[idx];
    // しおり線（このセグメントの前）
    if (!bm && n.bookmarkIdx === idx) {
      linesHTML += `<div class="bookmark-line">
        <div class="bookmark-icon">${bookmarkSVG()}</div>
        <div class="bookmark-line-bar"></div>
      </div>`;
    }
    // しおり編集ギャップ（高さ固定でズレを防ぐ）
    if (bm) {
      const isSel = state.bookmarkPreview === idx;
      linesHTML += `<div class="bm-gap visible ${isSel?"selected":""}" style="height:24px;"
        onclick="selectBookmarkGap(${idx})"><div class="bm-gap-line"></div></div>`;
    }
    if (state.showPinyin) {
      linesHTML += `<div class="line-chinese" style="font-size:${s.ch}px;color:${c.ch};line-height:${s.lhCh};">${esc(seg.chinese)}</div>
        <div class="line-pinyin" style="font-size:${s.py}px;color:${c.py};line-height:${s.lhPy};margin-bottom:${s.mbPy}px;">${seg.pinyin}</div>`;
    } else {
      linesHTML += `<div class="line-chinese" style="font-size:${s.ch}px;color:${c.ch};line-height:${s.lhCh};margin-bottom:${s.mbNoPy}px;">${esc(seg.chinese)}</div>`;
    }
  }
  // 末尾ギャップ・しおり線
  if (bm) {
    const isSel = state.bookmarkPreview === total;
    linesHTML += `<div class="bm-gap visible ${isSel?"selected":""}" style="height:24px;"
      onclick="selectBookmarkGap(${total})"><div class="bm-gap-line"></div></div>`;
  }
  if (!bm && n.bookmarkIdx === total) {
    linesHTML += `<div class="bookmark-line">
      <div class="bookmark-icon">${bookmarkSVG()}</div>
      <div class="bookmark-line-bar"></div>
    </div>`;
  }

  const titleArea = folder
    ? `<div class="header-breadcrumb" style="color:${c.py};">${esc(folder.title)}</div>
       <div class="header-main-title" style="color:${c.ch};">${esc(n.title)}</div>`
    : `<div class="header-main-title" style="color:${c.ch};">${esc(n.title)}</div>`;

  let rightBtns = "";
  if (bm) {
    rightBtns = `
      <button onclick="saveBookmark()" style="background:#e8820a;border:none;border-radius:8px;
        padding:7px 14px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;">保存</button>
      <button onclick="cancelBookmark()" class="cancel-btn"
        style="color:${c.ui};border-color:${c.bd};background:${c.input};">取消</button>`;
  } else {
    rightBtns =
      hbtn("bookmark","しおり","startBookmarkMode()",c.ui) +
      hbtn("edit","編集","goEdit()",c.ui) +
      hbtn("settings","設定","toggleSettings()",c.ui);
  }

  // しおりジャンプボタン
  const hasBookmark = n.bookmarkIdx !== null && n.bookmarkIdx !== undefined;
  const jumpBtn = (!bm && hasBookmark)
    ? `<button id="bm-jump" onclick="jumpToBookmark()"
        style="background:${c.accent};color:${c.header};">しおりへ</button>` : "";

  app.innerHTML = `
    ${mkHeader(
      `<button class="hbtn" onclick="goList()" style="color:${c.py};">
        <span class="material-icons">arrow_back_ios</span>
        <span class="hbtn-label">一覧</span>
      </button>`,
      titleArea, rightBtns
    )}
    <div id="bm-banner" class="${bm?"visible":""}">行間の点線をタップしてしおりの位置を選んでください</div>
    ${settingsPanel()}
    <div id="view-content" class="${bm?"bm-mode":""}" style="padding:20px 20px 120px;">
      ${linesHTML}
      ${n.segments.length===0?`<div style="opacity:0.4;font-size:14px;text-align:center;padding:40px 0;">編集ボタンで文章を入力</div>`:""}
    </div>
    ${jumpBtn}`;

  if (bm) {
    const vc = document.getElementById("view-content");
    if (vc) {
      vc.style.pointerEvents = "none";
      vc.querySelectorAll(".bm-gap").forEach(el => el.style.pointerEvents="auto");
    }
  }

  // しおりがある場合はしおり位置へスクロール、なければ先頭
  requestAnimationFrame(() => {
    if (!bm && hasBookmark) jumpToBookmark(false);
    else window.scrollTo(0,0);
  });
}

function jumpToBookmark(smooth=true) {
  const n = note(); if (!n || n.bookmarkIdx === null) return;
  // しおり線要素を探す
  const bmEl = document.querySelector(".bookmark-line");
  if (bmEl) {
    const top = bmEl.getBoundingClientRect().top + window.scrollY - 80;
    window.scrollTo({ top, behavior: smooth ? "smooth" : "auto" });
  }
}

    ?`「${item.title}」フォルダとその中のノートを削除しますか？`

// ============================================================
// SWIPE
// ============================================================
function initSwipeListeners() {
  const targets=[...document.querySelectorAll(".child-note-inner,.top-note-inner,.folder-row-inner")];
  targets.forEach(el=>{
    let startX=0,startY=0,tracking=false;
    el.addEventListener("touchstart",e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; tracking=false; },{passive:true});
    el.addEventListener("touchmove",e=>{
      const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
      if(!tracking&&Math.abs(dy)>Math.abs(dx))return; tracking=true;
      const id=parseInt(el.id.replace("inner-",""));
      const actions=document.getElementById("swipe-actions-"+id); if(!actions)return;
      const w=actions.scrollWidth,moved=Math.max(0,Math.min(-dx,w));
      el.style.transform=`translateX(-${moved}px)`; actions.style.transform=`translateX(${w-moved}px)`;
    },{passive:true});
    el.addEventListener("touchend",e=>{
      const dx=e.changedTouches[0].clientX-startX;
      const id=parseInt(el.id.replace("inner-",""));
      const actions=document.getElementById("swipe-actions-"+id); if(!actions)return;
      const w=actions.scrollWidth;
      if(dx<-w/2){ el.style.transform=`translateX(-${w}px)`; actions.style.transform=`translateX(0)`; state.swipeOpen=id; }
      else{ el.style.transform=""; actions.style.transform=`translateX(${w}px)`; state.swipeOpen=null; }
    });
  });
}
function closeSwipe() {
  if(state.swipeOpen==null)return;
  const id=state.swipeOpen;
  const inner=document.getElementById("inner-"+id);
  const actions=document.getElementById("swipe-actions-"+id);
  if(inner)inner.style.transform="";
  if(actions){const w=actions.scrollWidth;actions.style.transform=`translateX(${w}px)`;}
  state.swipeOpen=null;
}
function closeSwipeOnBg(e) {
  if(state.swipeOpen!=null&&!e.target.closest(".swipe-actions"))closeSwipe();
}

function dragStart(e,id) {

  setTimeout(()=>e.target.closest(".top-note-row,.child-note-row")?.classList.add("dragging"),0);
}
function dragEnd(e){ e.target.closest(".top-note-row,.child-note-row")?.classList.remove("dragging"); state.dragId=null; }
function folderDragOver(e,id){ if(!state.dragId)return; e.preventDefault(); document.getElementById("item-"+id)?.classList.add("drag-over-folder"); }
function folderDragLeave(e,id){ document.getElementById("item-"+id)?.classList.remove("drag-over-folder"); }
function folderDrop(e,id){
  e.preventDefault(); document.getElementById("item-"+id)?.classList.remove("drag-over-folder");
  const noteId=parseInt(e.dataTransfer.getData("text/plain"));
  const n=state.items.find(i=>i.id===noteId&&i.kind==="note");
  if(n){ n.folderId=id; markUnsaved(); }
  state.dragId=null; render();
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function showToast(msg) {
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.textContent=msg;
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.75);color:#fff;padding:8px 18px;border-radius:20px;
    font-size:13px;z-index:200;white-space:nowrap;pointer-events:none;opacity:1;transition:opacity 0.4s;`;
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity="0";},2500);
}

async function findDriveFile() {
  if(_driveFileId)return _driveFileId;
  const res=await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`,
    {headers:{Authorization:"Bearer "+_accessToken}}
  );
  const data=await res.json();
  _driveFileId=data.files?.[0]?.id||null;
  return _driveFileId;
}
async function driveSave() {
  if(!_accessToken){showToast("先にGoogleアカウントに接続してください");return;}
  showToast("保存中...");
  try {
    const json=JSON.stringify({
      items:state.items.map(item=>{
        if(item.kind==="note"){const{segments,...rest}=item;return rest;}
        return item;
      }),
      colorIdx:state.colorIdx, sizeIdx:state.sizeIdx,
      showPinyin:state.showPinyin, nextId:state.nextId,
      savedAt:new Date().toISOString(),
    });
    const fileId=await findDriveFile();
    const blob=new Blob([json],{type:"application/json"});
    if(fileId){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{
        method:"PATCH",
        headers:{Authorization:"Bearer "+_accessToken,"Content-Type":"application/json"},
        body:blob,
      });
    } else {
      const meta={name:FILE_NAME,parents:["appDataFolder"]};
      const form=new FormData();
      form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
      form.append("file",blob);
      const res=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{
        method:"POST",headers:{Authorization:"Bearer "+_accessToken},body:form,
      });
      const data=await res.json(); _driveFileId=data.id;
    }
    state.unsaved=false;
    showToast("Google Driveに保存しました ✓");
    render();
  } catch(e){ showToast("保存エラー: "+e.message); }
}
async function driveLoad() {
  if(!_accessToken){showToast("先にGoogleアカウントに接続してください");return;}
  showToast("読み込み中...");
  try {
    const fileId=await findDriveFile();
    if(!fileId){showToast("保存データが見つかりません");return;}
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      {headers:{Authorization:"Bearer "+_accessToken}});
    const data=await res.json();
    state.items    =data.items||state.items;
    state.colorIdx =data.colorIdx??state.colorIdx;
    state.sizeIdx  =data.sizeIdx??state.sizeIdx;
    state.showPinyin=data.showPinyin??state.showPinyin;
    state.nextId   =data.nextId??state.nextId;
    state.items.forEach(item=>{
      if(item.kind==="note"){
        item.segments=buildSegments(item.raw||"", []);
        if(item.bookmarkIdx===undefined)item.bookmarkIdx=null;
      }
    });
    state.unsaved=false;
    showToast("読み込みました ✓"); render();
  } catch(e){ showToast("読み込みエラー: "+e.message); }
}
function renderDriveStatus(){ if(state.page==="list")render(); }

function driveButtonsHTML(c) {
  const dot = state.unsaved ? `<span class="unsaved-dot"></span>` : "";
  if(!_accessToken){
    return `<button onclick="driveSignIn()" class="hbtn" style="color:${c.accent};">
      <span class="material-icons">cloud</span>
      <span class="hbtn-label">接続</span>
    </button>`;
  }
  return `
    <button onclick="driveLoad()" class="hbtn" style="color:${c.accent};">
      <span class="material-icons">cloud_download</span>
      <span class="hbtn-label">読込</span>
    </button>
    <button onclick="driveSave()" class="hbtn" style="color:${state.unsaved?'#e8820a':c.accent};">
      <span class="material-icons">cloud_upload</span>
      <span class="hbtn-label">保存${dot}</span>
    </button>`;
}

// ============================================================
// BOOT
// ============================================================
function boot() {
  state.sizeIdx=defaultSizeIdx();
  state.items.forEach(item=>{
    if(item.kind==="note"){
      if(!item.segments||item.segments.length===0)item.segments=buildSegments(item.raw||"",[]);
      if(item.bookmarkIdx===undefined)item.bookmarkIdx=null;
    }
  });
  render();
}
function waitAndBoot(){
  if(window.pinyinPro&&window.pinyinPro.pinyin)boot();
  else setTimeout(waitAndBoot,100);
}
waitAndBoot();
</script>
