<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中国語ノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; transition: background 0.3s, color 0.3s;
  font-family: 'Noto Sans SC', 'Hiragino Sans', sans-serif; }

/* ヘッダー */
.header {
  position: sticky; top: 0; z-index: 10;
  padding: 12px 16px; border-bottom-width: 1px; border-bottom-style: solid;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.header-title { font-size: 16px; font-weight: 700; flex: 1; }
.header-btns  { display: flex; gap: 8px; align-items: center; }
.hbtn {
  background: none; border: none; cursor: pointer;
  font-size: 18px; padding: 4px 6px; border-radius: 6px; line-height: 1;
}

/* 設定パネル */
#settings-panel {
  position: fixed; top: 50px; right: 12px; z-index: 100;
  border-radius: 14px; padding: 16px; min-width: 220px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
}
.sp-label { font-size: 11px; opacity: 0.55; margin-bottom: 8px; letter-spacing: 0.05em; }
.sp-row   { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.sp-row:last-child { margin-bottom: 0; }
.sp-chip {
  border-radius: 20px; padding: 5px 12px; font-size: 13px; cursor: pointer;
  border-width: 1px; border-style: solid; font-family: inherit;
}
.sp-toggle {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 0;
}
.toggle-track {
  width: 42px; height: 24px; border-radius: 12px; position: relative;
  cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.toggle-thumb {
  position: absolute; top: 3px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff; transition: left 0.2s;
}

/* 一覧 */
.list-item {
  display: flex; align-items: center;
  padding: 0; border-bottom-width: 1px; border-bottom-style: solid;
  position: relative; overflow: hidden; user-select: none;
}
.list-item-inner {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; cursor: pointer; transition: transform 0.2s ease;
}
.item-icon  { font-size: 18px; flex-shrink: 0; }
.item-title { font-size: 15px; font-weight: 500; }
.item-edit-title {
  font-size: 15px; font-weight: 500; flex: 1;
  background: none; border: none; outline: none; font-family: inherit;
  border-bottom-width: 1px; border-bottom-style: solid; padding-bottom: 2px;
}
.swipe-actions {
  display: flex; position: absolute; right: 0; top: 0; bottom: 0;
  transform: translateX(100%); transition: transform 0.2s ease;
}
.swipe-btn {
  border: none; cursor: pointer; font-size: 13px; font-weight: 600;
  padding: 0 18px; color: #fff; white-space: nowrap;
}
.folder-children { overflow: hidden; transition: max-height 0.25s ease; }

/* ドラッグ */
.dragging { opacity: 0.4; }
.drag-over-folder { outline: 2px dashed currentColor; outline-offset: -2px; border-radius: 4px; }

/* ビューア */
.line-chinese { font-weight: 700; line-height: 1.5; letter-spacing: 0.04em; }
.line-pinyin  { line-height: 1.4; letter-spacing: 0.06em; margin-bottom: 14px; }

/* モーダル */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); align-items: flex-end; z-index: 50;
}
.modal-overlay.open { display: flex; }
.modal-box { width: 100%; border-radius: 20px 20px 0 0; padding: 24px 20px 44px; }
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.modal-input {
  width: 100%; border-radius: 10px; padding: 10px 12px; font-size: 16px;
  font-family: inherit; outline: none; border-width: 1px; border-style: solid; margin-bottom: 12px;
}
.mbtn {
  width: 100%; border: none; border-radius: 10px; padding: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 8px;
}
.mbtn-ghost { background: none; border-width: 1px; border-style: solid; }

/* FAB */
.fab {
  position: fixed; bottom: 28px; right: 24px; width: 52px; height: 52px;
  border-radius: 50%; color: #fff; font-size: 28px; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center;
}

/* 編集テキストエリア */
#edit-textarea {
  width: 100%; border-radius: 10px; padding: 14px; resize: none; outline: none;
  line-height: 1.8; font-family: inherit; border-width: 1px; border-style: solid;
  min-height: 60vh;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// テーマ定義
// ============================================================
const COLORS = [
  {
    id: "night-cream",
    label: "夜(クリーム)",
    bg: "#1c1c24", header: "#14141a", ch: "#ede0cc", py: "#88c0a0",
    ui: "#b8b8c8", bd: "#2e2e3a", input: "#252530", accent: "#88c0a0",
  },
  {
    id: "night-green",
    label: "夜(緑)",
    bg: "#141e1a", header: "#0e1712", ch: "#c8e6c0", py: "#7ab8d4",
    ui: "#a8c8a8", bd: "#243028", input: "#1a2820", accent: "#7ab8d4",
  },
  {
    id: "paper",
    label: "紙",
    bg: "#f5f0e8", header: "#ede5d8", ch: "#3a2d1e", py: "#7a6a4a",
    ui: "#5a4a3a", bd: "#ddd0bc", input: "#fdfaf5", accent: "#7a6a4a",
  },
];

const SIZES = [
  { label: "小", ch: 17, py: 12 },
  { label: "中", ch: 22, py: 14 },
  { label: "大", ch: 28, py: 17 },
];

// ============================================================
// 区切り処理（句点+"は区切らない）
// ============================================================
const DELIMITERS_SPLIT = /([。！？!?]+)/;
const DELIMITERS_TEST  = /^[。！？!?]+$/;

function buildSegments(raw, oldSegments) {
  const oldMap = {};
  (oldSegments || []).forEach(s => { oldMap[s.chinese] = s.pinyin; });
  const segments = [];

  raw.split(/\n/).forEach(block => {
    block = block.trim();
    if (!block) return;

    const parts = block.split(DELIMITERS_SPLIT);
    let buf = "";
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      if (!part) continue;
      if (DELIMITERS_TEST.test(part)) {
        buf += part;
        // 次のパーツが「"」「」」などの閉じ括弧なら区切らずに続ける
        const next = parts[i + 1] || "";
        if (/^["""」』】〕)）]/.test(next)) {
          // 閉じ括弧を吸収してから確定
          buf += next;
          i++;
        }
        const text = buf.trim();
        if (text) segments.push({ chinese: text, pinyin: oldMap[text] || getPy(text) });
        buf = "";
      } else {
        buf += part;
      }
    }
    const text = buf.trim();
    if (text) segments.push({ chinese: text, pinyin: oldMap[text] || getPy(text) });
  });
  return segments;
}

function getPy(text) {
  if (window.pinyinPro && window.pinyinPro.pinyin)
    return window.pinyinPro.pinyin(text, { toneType: "symbol", separator: " " });
  return "";
}

// ============================================================
// STATE
// ============================================================
const NOVEL_RAW =
`金陵，大梁帝都。物宝天华王气蒸蔚，这里连城门也与他处不同，格外的巍峨坚实。川流不息入城的人流中，一辆青蓬双辕的马车不起眼地夹在其中，摇摇缓行，在距离城门数丈之地停顿了下来。
车帘掀起，一个月白衣衫，容颜清朗的年轻人跳下车，前行几步，仰起头凝望着城门上方的"金陵"二字。
走在马车前方的两名骑士察觉到后面有异样，回过头看了一下，一齐拨转马头奔了过来。这两人都是贵族公子的打扮，年龄也大致相仿，跑在前面的一个远远就在问："苏兄，你怎么了？"
梅长苏没有回答，他依然保持着仰望城门的姿势，表情凝然不动，一头乌发被风吹起，有几丝零散地覆在苍白的面颊上，使得整个人透出一股深邃的沧桑与悲凉。
"苏兄是不是累了？"这时另外一人也奔至近前，关切地道，"就快到了，今天可以好好歇歇。"
"景睿，谢弼，"梅长苏毫无颜色的唇边掠过一抹浅淡的笑，"我想在这里再站一会儿……这么多年没来，想不到金陵城几乎丝毫未变，进了城门后，多半也依然是冠盖满京华的盛况吧……"
萧景睿微微有些怔忡，问道："怎么苏兄以前……来过金陵？"`;

let state = {
  page: "list",         // "list" | "view" | "edit"
  items: [              // フォルダ・ノートの混在リスト
    { kind: "note",   id: 1, title: "はじめての中国語", raw: "你好，我叫小明。今天天气很好。\n我喜欢学习中文。", segments: [], folderId: null },
    { kind: "folder", id: 2, title: "小説", open: true },
    { kind: "note",   id: 3, title: "第1章", raw: NOVEL_RAW, segments: [], folderId: 2 },
  ],
  currentNoteId: null,
  colorIdx: 0,
  sizeIdx: 1,
  showPinyin: true,
  showSettings: false,
  listEditMode: false,
  editText: "",
  nextId: 20,
  // スワイプ
  swipeId: null,
  swipeX: 0,
  swipeStartX: 0,
  swipeOpen: null,    // 現在開いているスワイプのid
  // ドラッグ
  dragId: null,
};

const col  = () => COLORS[state.colorIdx];
const sz   = () => SIZES[state.sizeIdx];
const note = () => state.items.find(i => i.id === state.currentNoteId);

// ============================================================
// RENDER ROOT
// ============================================================
function render() {
  const c = col();
  document.body.style.background = c.bg;
  document.body.style.color      = c.ui;
  const app = document.getElementById("app");
  if      (state.page === "list") renderList(app);
  else if (state.page === "view") renderView(app);
  else if (state.page === "edit") renderEdit(app);
}

// ============================================================
// HEADER HELPER
// ============================================================
function header(leftHTML, titleHTML, rightHTML) {
  const c = col();
  return `<div class="header" style="background:${c.header};border-color:${c.bd};">
    <div style="min-width:60px;">${leftHTML}</div>
    <div class="header-title" style="color:${c.ch};">${titleHTML}</div>
    <div class="header-btns">${rightHTML}</div>
  </div>`;
}

// ============================================================
// SETTINGS PANEL
// ============================================================
function settingsPanel() {
  if (!state.showSettings) return "";
  const c = col(); const s = sz();
  const chipStyle = (active) =>
    `class="sp-chip" style="background:${active ? c.accent : c.input};
     border-color:${active ? c.accent : c.bd};
     color:${active ? '#fff' : c.ui};"`;

  // トグル
  const trackBg  = state.showPinyin ? c.accent : c.bd;
  const thumbPos = state.showPinyin ? "21px" : "3px";

  return `<div id="settings-panel" style="background:${c.header};border:1px solid ${c.bd};">
    <div class="sp-label">文字サイズ</div>
    <div class="sp-row">
      ${SIZES.map((sz2, i) => `<button ${chipStyle(state.sizeIdx === i)} onclick="setSizeIdx(${i})">${sz2.label}</button>`).join("")}
    </div>
    <div class="sp-label">カラー</div>
    <div class="sp-row">
      ${COLORS.map((cc, i) => `<button ${chipStyle(state.colorIdx === i)} onclick="setColorIdx(${i})">${cc.label}</button>`).join("")}
    </div>
    <div class="sp-label" style="margin-top:4px;">ピンイン</div>
    <div class="sp-row sp-toggle">
      <span style="font-size:13px;">表示する</span>
      <div class="toggle-track" style="background:${trackBg};" onclick="togglePinyin()">
        <div class="toggle-thumb" style="left:${thumbPos};"></div>
      </div>
    </div>
  </div>`;
}

// ============================================================
// LIST
// ============================================================
function renderList(app) {
  const c = col(); const em = state.listEditMode;

  // トップレベル（folderId===null）のノートとフォルダを順に
  const topItems = state.items.filter(i => i.kind === "folder" || (i.kind === "note" && !i.folderId));

  let itemsHTML = "";
  topItems.forEach(item => {
    if (item.kind === "folder") {
      itemsHTML += folderItemHTML(item, c, em);
    } else {
      itemsHTML += noteItemHTML(item, c, em, null);
    }
  });

  const editBtn = `<button class="hbtn" style="color:${c.ui};" onclick="toggleListEdit()">${em ? "完了" : "✎"}</button>`;
  const settBtn = `<button class="hbtn" style="color:${c.ui};" onclick="toggleSettings()">⚙</button>`;

  app.innerHTML = `
    ${header("", "📖 中国語ノート", editBtn + settBtn)}
    ${settingsPanel()}
    <div style="padding-bottom:100px;" onclick="closeSwipe()">
      ${itemsHTML}
      ${state.items.length === 0 ? `<div style="text-align:center;padding:60px 20px;opacity:0.4;font-size:14px;">＋ボタンで作成</div>` : ""}
    </div>
    <button class="fab" onclick="openNewModal()" style="background:${c.accent};">＋</button>

    <!-- 新規作成モーダル -->
    <div class="modal-overlay" id="newModal" onclick="closeNewModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">新規作成</div>
        <button class="mbtn" onclick="startNewNote()" style="background:${c.accent};color:#fff;">📄 新規ノート</button>
        <button class="mbtn" onclick="startNewFolder()" style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};">📁 新規フォルダ</button>
        <button class="mbtn mbtn-ghost" onclick="closeNewModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>

    <!-- タイトル入力モーダル -->
    <div class="modal-overlay" id="titleModal" onclick="closeTitleModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" id="titleModalLabel" style="color:${c.accent};"></div>
        <input id="titleInput" class="modal-input" style="background:${c.input};border-color:${c.bd};color:${c.ch};"
          onkeydown="if(event.key==='Enter')confirmTitle()">
        <button class="mbtn" onclick="confirmTitle()" style="background:${c.accent};color:#fff;">作成</button>
        <button class="mbtn mbtn-ghost" onclick="closeTitleModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>

    <!-- フォルダ移動モーダル -->
    <div class="modal-overlay" id="moveModal" onclick="closeMoveModal()">
      <div class="modal-box" style="background:${c.header};" onclick="event.stopPropagation()">
        <div class="modal-title" style="color:${c.accent};">移動先フォルダを選択</div>
        ${[{id: null, title: "（フォルダなし・トップレベル）"}, ...state.items.filter(i => i.kind === "folder")].map(f =>
          `<button class="mbtn" onclick="moveNoteTo(${f.id})"
            style="background:${c.input};color:${c.ch};border:1px solid ${c.bd};text-align:left;">
            ${f.id ? "📁 " : "📄 "}${f.title}</button>`
        ).join("")}
        <button class="mbtn mbtn-ghost" onclick="closeMoveModal()" style="border-color:${c.bd};color:${c.ui};">キャンセル</button>
      </div>
    </div>`;

  initSwipeListeners();
  initDragListeners();
}

function folderItemHTML(folder, c, em) {
  const children = state.items.filter(i => i.kind === "note" && i.folderId === folder.id);
  const arrow = folder.open ? "▾" : "▸";

  let inner = "";
  if (em) {
    inner = `<div class="list-item-inner" style="cursor:default;">
      <span class="item-icon">📁</span>
      <input class="item-edit-title" value="${esc(folder.title)}"
        style="color:${c.ch};border-color:${c.bd};"
        onchange="renameItem(${folder.id}, this.value)">
      <button onclick="deleteItem(${folder.id})" style="background:none;border:none;color:#e05555;cursor:pointer;font-size:18px;">−</button>
    </div>`;
  } else {
    inner = `<div class="list-item-inner" id="inner-${folder.id}"
        onclick="toggleFolder(${folder.id})"
        draggable="false">
      <span class="item-icon">📁</span>
      <span class="item-title" style="color:${c.ch};">${esc(folder.title)}</span>
      <span style="margin-left:auto;opacity:0.5;">${arrow}</span>
    </div>
    <div class="swipe-actions" id="swipe-actions-${folder.id}">
      <button class="swipe-btn" style="background:#e05555;" onclick="deleteItem(${folder.id})">削除</button>
    </div>`;
  }

  const childrenHTML = children.map(n => noteItemHTML(n, c, em, folder.id)).join("");
  const maxH = folder.open ? (children.length * 60 + 10) + "px" : "0px";

  return `
    <div class="list-item" id="item-${folder.id}" style="border-color:${c.bd};" data-id="${folder.id}" data-kind="folder">
      ${inner}
    </div>
    <div class="folder-children" id="children-${folder.id}" style="max-height:${maxH};">
      ${childrenHTML}
    </div>`;
}

function noteItemHTML(note, c, em, folderId) {
  const indent = folderId ? "padding-left:32px;" : "";
  let inner = "";
  if (em) {
    inner = `<div class="list-item-inner" style="cursor:default;${indent}">
      <span class="item-icon">📄</span>
      <input class="item-edit-title" value="${esc(note.title)}"
        style="color:${c.ch};border-color:${c.bd};"
        onchange="renameItem(${note.id}, this.value)">
      <button onclick="deleteItem(${note.id})" style="background:none;border:none;color:#e05555;cursor:pointer;font-size:18px;">−</button>
    </div>`;
  } else {
    inner = `<div class="list-item-inner" id="inner-${note.id}"
        onclick="openNote(${note.id})"
        draggable="true"
        ondragstart="dragStart(event,${note.id})"
        ondragend="dragEnd(event)"
        style="${indent}">
      <span class="item-icon">📄</span>
      <span class="item-title" style="color:${c.ch};">${esc(note.title)}</span>
      <span style="margin-left:auto;opacity:0.35;">›</span>
    </div>
    <div class="swipe-actions" id="swipe-actions-${note.id}">
      <button class="swipe-btn" style="background:#5b8fd4;" onclick="openMoveModal(${note.id})">移動</button>
      <button class="swipe-btn" style="background:#e05555;" onclick="deleteItem(${note.id})">削除</button>
    </div>`;
  }
  return `<div class="list-item" id="item-${note.id}" style="border-color:${c.bd};"
    data-id="${note.id}" data-kind="note"
    ondragover="dragOver(event,${note.id})"
    ondrop="drop(event,${note.id})">
    ${inner}
  </div>`;
}

// ============================================================
// VIEW
// ============================================================
function renderView(app) {
  const c = col(); const s = sz(); const n = note();
  if (!n) { state.page = "list"; render(); return; }

  const linesHTML = n.segments.map(seg => {
    const pyLine = state.showPinyin
      ? `<div class="line-pinyin" style="font-size:${s.py}px;color:${c.py};">${seg.pinyin}</div>` : "";
    return `<div class="line-chinese" style="font-size:${s.ch}px;color:${c.ch};">${esc(seg.chinese)}</div>${pyLine}`;
  }).join("");

  app.innerHTML = `
    ${header(
      `<button class="hbtn" style="color:${c.py};" onclick="goList()">‹ 一覧</button>`,
      esc(n.title),
      `<button class="hbtn" style="color:${c.ui};" onclick="goEdit()">✎</button>
       <button class="hbtn" style="color:${c.ui};" onclick="toggleSettings()">⚙</button>`
    )}
    ${settingsPanel()}
    <div style="padding:20px 20px 120px;">
      ${linesHTML}
      ${n.segments.length === 0 ? `<div style="opacity:0.4;font-size:14px;text-align:center;padding:40px 0;">✎ボタンで編集</div>` : ""}
    </div>`;
}

// ============================================================
// EDIT
// ============================================================
function renderEdit(app) {
  const c = col(); const s = sz(); const n = note();
  if (!n) { state.page = "list"; render(); return; }

  app.innerHTML = `
    ${header(
      `<button onclick="cancelEdit()" style="background:none;border:none;color:${c.ui};cursor:pointer;font-size:14px;">取消</button>`,
      esc(n.title),
      `<button onclick="saveEdit()" style="background:${c.accent};border:none;border-radius:8px;
        padding:6px 14px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;">保存</button>`
    )}
    <div style="padding:10px 16px 4px;font-size:12px;opacity:0.4;">句点（。！？）または改行でピンインが区切られます</div>
    <div style="padding:8px 16px 120px;">
      <textarea id="edit-textarea"
        style="background:${c.input};border-color:${c.bd};color:${c.ch};font-size:${s.ch}px;"
        placeholder="中国語を入力...">${esc(state.editText)}</textarea>
    </div>`;

  const ta = document.getElementById("edit-textarea");
  if (ta) {
    ta.style.height = "auto";
    ta.style.height = Math.max(ta.scrollHeight, window.innerHeight * 0.65) + "px";
    ta.addEventListener("input", () => { ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px"; });
  }
}

// ============================================================
// ACTIONS — 設定
// ============================================================
function toggleSettings() { state.showSettings = !state.showSettings; render(); }
function setSizeIdx(i)  { state.sizeIdx  = i; render(); }
function setColorIdx(i) { state.colorIdx = i; render(); }
function togglePinyin() { state.showPinyin = !state.showPinyin; render(); }

// ============================================================
// ACTIONS — 一覧
// ============================================================
function toggleListEdit() { state.listEditMode = !state.listEditMode; render(); }
function toggleFolder(id) {
  const f = state.items.find(i => i.id === id);
  if (f) f.open = !f.open;
  render();
}
function openNote(id) {
  state.currentNoteId = id;
  state.page = "view";
  state.showSettings = false;
  render();
}
function goList() { state.page = "list"; state.showSettings = false; render(); }
function goEdit() {
  const n = note(); if (!n) return;
  state.editText = n.raw || n.segments.map(s => s.chinese).join("\n");
  state.page = "edit"; render();
}
function cancelEdit() { state.page = "view"; render(); }
function saveEdit() {
  const ta = document.getElementById("edit-textarea"); if (!ta) return;
  const n = note(); if (!n) return;
  n.raw = ta.value;
  n.segments = buildSegments(ta.value, n.segments);
  state.page = "view"; render();
}

function renameItem(id, val) {
  const item = state.items.find(i => i.id === id);
  if (item) item.title = val;
}
function deleteItem(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  if (item.kind === "folder") {
    if (!confirm(`「${item.title}」フォルダとその中のノートを削除しますか？`)) return;
    state.items = state.items.filter(i => !(i.id === id || i.folderId === id));
  } else {
    if (!confirm(`「${item.title}」を削除しますか？`)) return;
    state.items = state.items.filter(i => i.id !== id);
  }
  render();
}

// ============================================================
// MODALS
// ============================================================
let _pendingKind = null; // "note" | "folder"
let _movingNoteId = null;

function openNewModal()  { render(); setTimeout(() => document.getElementById("newModal")?.classList.add("open"), 0); }
function closeNewModal() { document.getElementById("newModal")?.classList.remove("open"); }

function startNewNote()   { _pendingKind = "note";   closeNewModal(); openTitleModal("新規ノートのタイトル"); }
function startNewFolder() { _pendingKind = "folder"; closeNewModal(); openTitleModal("新規フォルダのタイトル"); }

function openTitleModal(label) {
  render();
  setTimeout(() => {
    const m = document.getElementById("titleModal"); if (!m) return;
    const l = document.getElementById("titleModalLabel"); if (l) l.textContent = label;
    const inp = document.getElementById("titleInput"); if (inp) { inp.value = ""; inp.focus(); }
    m.classList.add("open");
  }, 0);
}
function closeTitleModal() { document.getElementById("titleModal")?.classList.remove("open"); }

function confirmTitle() {
  const inp = document.getElementById("titleInput");
  const title = inp?.value.trim() || (_pendingKind === "folder" ? "新しいフォルダ" : "新しいノート");
  const id = state.nextId++;
  if (_pendingKind === "folder") {
    state.items.push({ kind: "folder", id, title, open: true });
    closeTitleModal();
    render();
  } else {
    state.items.push({ kind: "note", id, title, raw: "", segments: [], folderId: null });
    closeTitleModal();
    state.currentNoteId = id;
    state.editText = "";
    state.page = "edit";
    render();
  }
}

function openMoveModal(noteId) {
  _movingNoteId = noteId;
  closeSwipe();
  render();
  setTimeout(() => document.getElementById("moveModal")?.classList.add("open"), 0);
}
function closeMoveModal() { document.getElementById("moveModal")?.classList.remove("open"); }
function moveNoteTo(folderId) {
  const n = state.items.find(i => i.id === _movingNoteId);
  if (n) n.folderId = folderId;
  closeMoveModal();
  render();
}

// ============================================================
// SWIPE（モバイル）
// ============================================================
function initSwipeListeners() {
  document.querySelectorAll(".list-item-inner").forEach(el => {
    let startX = 0, startY = 0, moved = false;
    el.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      moved = false;
    }, { passive: true });
    el.addEventListener("touchmove", e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!moved && Math.abs(dy) > Math.abs(dx)) return; // 縦スクロール優先
      moved = true;
      const id = parseInt(el.id.replace("inner-", ""));
      const actions = document.getElementById("swipe-actions-" + id);
      if (!actions) return;
      const w = actions.scrollWidth;
      const clamped = Math.max(0, Math.min(-dx, w));
      el.style.transform = `translateX(-${clamped}px)`;
      actions.style.transform = `translateX(${w - clamped}px)`;
    }, { passive: true });
    el.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - startX;
      const id = parseInt(el.id.replace("inner-", ""));
      const actions = document.getElementById("swipe-actions-" + id);
      if (!actions) return;
      const w = actions.scrollWidth;
      if (dx < -w / 2) {
        el.style.transform = `translateX(-${w}px)`;
        actions.style.transform = `translateX(0)`;
        state.swipeOpen = id;
      } else {
        el.style.transform = "";
        actions.style.transform = `translateX(${w}px)`;
        state.swipeOpen = null;
      }
    });
  });
}

function closeSwipe() {
  if (state.swipeOpen == null) return;
  const id = state.swipeOpen;
  const inner = document.getElementById("inner-" + id);
  const actions = document.getElementById("swipe-actions-" + id);
  if (inner)   inner.style.transform = "";
  if (actions) { const w = actions.scrollWidth; actions.style.transform = `translateX(${w}px)`; }
  state.swipeOpen = null;
}

// ============================================================
// DRAG & DROP（PC・iPad）
// ============================================================
function initDragListeners() {
  document.querySelectorAll(".list-item[data-kind='folder']").forEach(el => {
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag-over-folder"); });
    el.addEventListener("dragleave", () => el.classList.remove("drag-over-folder"));
    el.addEventListener("drop", e => {
      e.preventDefault();
      el.classList.remove("drag-over-folder");
      const noteId = parseInt(e.dataTransfer.getData("text/plain"));
      const folderId = parseInt(el.dataset.id);
      const n = state.items.find(i => i.id === noteId && i.kind === "note");
      if (n) n.folderId = folderId;
      state.dragId = null;
      render();
    });
  });
}
function dragStart(e, id) { state.dragId = id; e.dataTransfer.setData("text/plain", id); e.target.closest(".list-item").classList.add("dragging"); }
function dragEnd(e)       { e.target.closest(".list-item")?.classList.remove("dragging"); }
function dragOver(e, id)  { e.preventDefault(); }
function drop(e, id)      { e.preventDefault(); }

// ============================================================
// UTIL
// ============================================================
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============================================================
// BOOT
// ============================================================
function boot() {
  state.items.forEach(item => {
    if (item.kind === "note" && (!item.segments || item.segments.length === 0)) {
      item.segments = buildSegments(item.raw || "", []);
    }
  });
  render();
}
function waitAndBoot() {
  if (window.pinyinPro && window.pinyinPro.pinyin) boot();
  else setTimeout(waitAndBoot, 100);
}
waitAndBoot();
</script>
